<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Karteikarten</title>
<link rel="icon" type="image/png" href="images/logo.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-muted: #666;
    --green: #2e7d32;
    --green-light: #e8f5e9;
    --red: #c62828;
    --red-light: #ffebee;
    --blue: #1565c0;
    --blue-light: #e3f2fd;
    --gray: #9e9e9e;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.10);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  /* ─── HEADER ─────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header select {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    border: none;
    background: transparent;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
    cursor: pointer;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  header .icon-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    border-radius: 8px;
    color: var(--text-muted);
    flex-shrink: 0;
    line-height: 1;
  }
  header .icon-btn:hover { background: var(--bg); }

  /* ─── STATS BAR ──────────────────────────── */
  .stats-bar {
    display: flex;
    gap: 8px;
    padding: 10px 16px 0;
    font-size: 12px;
    flex-wrap: wrap;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 12px;
  }
  .stat-pill.total  { background: #eeeeee; color: #444; }
  .stat-pill.done   { background: var(--green-light); color: var(--green); }
  .stat-pill.due    { background: var(--red-light); color: var(--red); }
  .stat-pill.unseen { background: #f3e5f5; color: #6a1b9a; }

  /* ─── PROGRESS BAR ───────────────────────── */
  .progress-wrap {
    padding: 10px 16px 14px;
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
  }
  .progress-bar .seg-done   { background: var(--green); transition: width .3s; }
  .progress-bar .seg-partial { background: #ff9800; transition: width .3s; }
  .progress-bar .seg-unseen { background: var(--border); flex: 1; }

  /* ─── CARD AREA ──────────────────────────── */
  .card-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px;
  }

  .flip-container {
    width: 100%;
    cursor: pointer;
  }

  .flip-inner {
    position: relative;
    width: 100%;
  }

  .card-face {
    width: 100%;
    border-radius: var(--radius);
    background: var(--surface);
    box-shadow: var(--shadow);
    padding: 20px 20px;
    min-height: 160px;
    max-height: 52dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
    text-align: left;
    transition: opacity 0.22s ease;
  }
  .card-face.back {
    display: none;
    background: #fafff8;
    border: 1px solid #c8e6c9;
  }
  .flip-inner.flipped .front { display: none; }
  .flip-inner.flipped .back  { display: flex; }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .card-q {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    width: 100%;
  }
  .card-a {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    text-align: left;
    width: 100%;
  }
  .card-img {
    margin-top: 14px;
    max-width: 100%;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .card-img-placeholder {
    margin-top: 14px;
    padding: 10px 14px;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text-muted);
    width: 100%;
    text-align: center;
  }
  .card-counter-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 11px;
    font-weight: 700;
    background: #fff3e0;
    color: #e65100;
    border-radius: 10px;
    padding: 2px 7px;
    z-index: 1;
  }
  .tap-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 10px;
  }

  /* ─── NAVIGATION ─────────────────────────── */
  .nav-row {
    display: flex;
    gap: 10px;
    padding: 14px 16px 8px;
    width: 100%;
    max-width: 480px;
  }
  .nav-btn {
    flex: 1;
    padding: 10px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
  }
  .nav-btn:hover { background: var(--bg); }

  /* ─── ACTION BUTTONS ─────────────────────── */
  .action-row {
    display: flex;
    gap: 12px;
    padding: 8px 16px 16px;
    width: 100%;
    max-width: 480px;
  }
  .action-btn {
    flex: 1;
    padding: 16px 10px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: transform .1s, opacity .1s;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn .badge {
    font-size: 11px;
    font-weight: 600;
    opacity: .7;
  }
  .btn-nope {
    background: var(--red-light);
    color: var(--red);
  }
  .btn-got {
    background: var(--green-light);
    color: var(--green);
  }
  .action-btn:disabled {
    opacity: .35;
    cursor: default;
  }

  /* ─── BOTTOM BAR ─────────────────────────── */
  .bottom-bar {
    display: flex;
    gap: 10px;
    padding: 0 16px 20px;
    width: 100%;
    max-width: 480px;
  }
  .bottom-btn {
    flex: 1;
    padding: 9px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
  }
  .bottom-btn:hover { background: var(--bg); }

  /* ─── DONE SCREEN ────────────────────────── */
  .done-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
    gap: 16px;
  }
  .done-screen .emoji { font-size: 56px; }
  .done-screen h2 { font-size: 22px; font-weight: 700; }
  .done-screen p { font-size: 15px; color: var(--text-muted); }
  .done-screen button {
    margin-top: 8px;
    padding: 14px 32px;
    border: none;
    border-radius: 12px;
    background: var(--blue);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }

  /* ─── EDITOR MODAL ───────────────────────── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .overlay.open { display: flex; }

  .sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 92dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sheet-header h3 { font-size: 17px; font-weight: 700; }
  .sheet-close {
    background: #f0f0f0;
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
  }

  .sheet-body {
    overflow-y: auto;
    padding: 16px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
  .form-group input, .form-group textarea, .form-group select {
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    outline: none;
    width: 100%;
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--blue);
    background: #fff;
  }

  .sheet-footer {
    padding: 12px 20px 24px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
  }
  .btn-primary {
    flex: 1;
    padding: 13px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 11px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-secondary {
    padding: 13px 18px;
    background: var(--bg);
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ─── CARD LIST (editor) ─────────────────── */
  .card-list-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .card-list-item .q { flex: 1; color: var(--text); }
  .card-list-item .del-btn {
    background: none;
    border: none;
    color: var(--red);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .card-list-item .edit-btn {
    background: none;
    border: none;
    color: var(--blue);
    font-size: 16px;
    cursor: pointer;
    padding: 0 4px;
    flex-shrink: 0;
  }

  .set-list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    cursor: pointer;
  }
  .set-list-item .set-name { flex: 1; font-weight: 500; }
  .set-list-item .set-count { font-size: 12px; color: var(--text-muted); }
  .set-list-item .del-btn {
    background: none; border: none; color: var(--red);
    font-size: 18px; cursor: pointer; padding: 0 4px;
  }

  .tab-row {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
  }
  .tab-btn.active {
    background: var(--blue-light);
    border-color: var(--blue);
    color: var(--blue);
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-top: 4px;
  }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    padding: 20px 0;
  }
</style>
</head>

// ═══════════════════════════════════════════════════════════════
//  APP STATE & LOGIC
// ═══════════════════════════════════════════════════════════════
const LS_KEY = 'karteikarten_user_sets';

function loadUserSets() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch { return []; }
}
function saveUserSets(sets) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(sets)); } catch {}
}

let allSets = [...BUILT_IN_SETS, ...loadUserSets()];
let currentSetIdx = 0;
let deck = [];
let cardIdx = 0;
let isFlipped = false;
let correctCounts = {};
let editorMode = null; // null | 'sets' | 'cards' | 'addCard' | 'addSet' | 'editCard'
let editorSetIdx = 0;
let editCardIdx = -1;

function currentSet() { return allSets[currentSetIdx]; }
function isUserSet(idx) { return idx >= BUILT_IN_SETS.length; }

function initDeck() {
  const cards = currentSet().cards;
  correctCounts = {};
  cards.forEach((_, i) => correctCounts[i] = 0);
  deck = cards.map((_, i) => i).filter(i => correctCounts[i] < 2);
  deck = shuffle([...deck]);
  cardIdx = 0;
  isFlipped = false;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function currentCard() {
  if (deck.length === 0) return null;
  return currentSet().cards[deck[cardIdx % deck.length]];
}
function currentCardRealIdx() {
  if (deck.length === 0) return -1;
  return deck[cardIdx % deck.length];
}
function currentCardCorrect() {
  return correctCounts[currentCardRealIdx()] || 0;
}

function markGot() {
  const ri = currentCardRealIdx();
  correctCounts[ri] = (correctCounts[ri] || 0) + 1;
  if (correctCounts[ri] >= 2) {
    deck.splice(cardIdx % deck.length, 1);
    if (deck.length === 0) { isFlipped = false; render(); return; }
    if (cardIdx >= deck.length) cardIdx = 0;
  } else {
    // Move to random later position
    const pos = cardIdx % deck.length;
    const later = Math.min(pos + Math.floor(Math.random() * 3) + 1, deck.length - 1);
    const [card] = deck.splice(pos, 1);
    deck.splice(later, 0, card);
    cardIdx = pos;
  }
  isFlipped = false;
  render();
}

function markNope() {
  const ri = currentCardRealIdx();
  correctCounts[ri] = 0;
  // Move to later position
  const pos = cardIdx % deck.length;
  const later = Math.min(pos + Math.floor(Math.random() * 4) + 2, deck.length - 1);
  const [card] = deck.splice(pos, 1);
  deck.splice(later, 0, card);
  cardIdx = pos;
  isFlipped = false;
  render();
}

function stats() {
  const total = currentSet().cards.length;
  const done = Object.values(correctCounts).filter(v => v >= 2).length;
  const partial = Object.values(correctCounts).filter(v => v === 1).length;
  const unseen = Object.values(correctCounts).filter(v => v === 0).length;
  return { total, done, partial, unseen };
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const card = currentCard();
  const s = stats();

  if (editorMode) { renderEditor(app); return; }

  const pctDone = s.total ? (s.done / s.total * 100) : 0;
  const pctPartial = s.total ? (s.partial / s.total * 100) : 0;

  const setOptions = allSets.map((set, i) =>
    `<option value="${i}" ${i === currentSetIdx ? 'selected' : ''}>${set.title}</option>`
  ).join('');

  if (!card) {
    app.innerHTML = `
      ${renderHeader(setOptions)}
      <div class="done-screen">
        <div class="emoji">★</div>
        <h2>Alles gewusst!</h2>
        <p>Du hast alle ${s.total} Karten zweimal richtig beantwortet.</p>
        <button onclick="resetDeck()">Nochmal von vorne</button>
      </div>
    `;
    wireHeader();
    return;
  }

  const correct = currentCardCorrect();
  const cardSectionHtml = card.section ? `<div class="card-label">${escHtml(card.section)}</div>` : '';

  let imgHtml = '';
  if (card.img) {
    imgHtml = `<img class="card-img" src="${escHtml(card.img)}" alt="Abbildung" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\'>[Bild] Bild: ${escHtml(card.img)}</div>'" />`;
  }

  app.innerHTML = `
    ${renderHeader(setOptions)}
    <div class="stats-bar">
      <div class="stat-pill total"># ${s.total}</div>
      <div class="stat-pill done">✓ ${s.done}</div>
      <div class="stat-pill due">↺ ${s.partial}</div>
      <div class="stat-pill unseen">□ ${s.unseen}</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="seg-done" style="width:${pctDone}%"></div>
        <div class="seg-partial" style="width:${pctPartial}%"></div>
        <div class="seg-unseen"></div>
      </div>
    </div>
    <div class="card-area">
      <div class="flip-container" onclick="flipCard()">
        <div class="flip-inner ${isFlipped ? 'flipped' : ''}">
          <div class="card-face front">
            ${correct === 1 ? '<div class="card-counter-badge">1× gewusst</div>' : ''}
            ${cardSectionHtml}
            <div class="card-q">${escHtml(card.q)}</div>
          </div>
          <div class="card-face back">
            <div class="card-label">Antwort</div>
            <div class="card-a">${escHtml(card.a)}${imgHtml}</div>
          </div>
        </div>
      </div>
      <div class="tap-hint">${isFlipped ? 'Tippe für Frage' : 'Tippe zum Aufdecken'}</div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevCard()">← Zurück</button>
      <button class="nav-btn" onclick="skipCard()">Überspringen →</button>
    </div>
    <div class="action-row">
      <button class="action-btn btn-nope" onclick="markNope()" ${!isFlipped ? 'disabled' : ''}>
        Nicht gewusst
        <span class="badge">Reset auf 0×</span>
      </button>
      <button class="action-btn btn-got" onclick="markGot()" ${!isFlipped ? 'disabled' : ''}>
        Gewusst
        <span class="badge">${correct === 0 ? '→ 1× nochmal' : '→ fertig! ✓'}</span>
      </button>
    </div>
    <div class="bottom-bar">
      <button class="bottom-btn" onclick="shuffleDeck()">⇄ Mischen</button>
      <button class="bottom-btn" onclick="resetDeck()">↺ Reset</button>
      <button class="bottom-btn" onclick="openEditor()">✎ Bearbeiten</button>
    </div>
  `;
  wireHeader();
}

function renderHeader(setOptions) {
  return `
    <header>
      <img src="images/logo.png" onerror="this.style.display='none'" style="height:28px;width:28px;object-fit:contain;border-radius:6px;flex-shrink:0;">
      <select onchange="changeSet(this.value)">${setOptions}</select>
      <button class="icon-btn" onclick="openEditor()" title="Bearbeiten">✎</button>
    </header>
  `;
}

function wireHeader() {
  // already wired via inline onchange
}

      ${renderHeader(allSets.map((s, i) => `<option value="${i}" ${i === currentSetIdx ? 'selected' : ''}>${s.title}</option>`).join(''))}

        <div class="sheet" onclick="event.stopPropagation()">

            <h3>Sets verwalten</h3>

          </div>
          <div class="sheet-body">

              <button class="tab-btn active">Sets</button>
              <button class="tab-btn" onclick="editorMode='cards';render()">Karten</button>

            ${allSets.map((s, i) => `
              <div class="set-list-item" onclick="switchEditorSet(${i})">

      <div class="overlay open" onclick="closeEditor()">
        <div class="sheet" onclick="event.stopPropagation()">
          <div class="sheet-header">
            <h3>Karten bearbeiten</h3>
            <button class="sheet-close" onclick="closeEditor()">×</button>
          </div>
          <div class="sheet-body">

          </div>
          <div class="sheet-footer">
            <button class="btn-secondary" onclick="editorMode='sets';render()">← Sets</button>
            <button class="btn-primary" onclick="startAddCard()">+ Karte</button>
          </div>
        </div>

    wireHeader();
  }
  else if (editorMode === 'addCard' || editorMode === 'editCard') {
    const isEdit = editorMode === 'editCard';
    const c = isEdit ? set.cards[editCardIdx] : null;
    app.innerHTML = `
      ${renderHeader(allSets.map((s, i) => `<option value="${i}" ${i === currentSetIdx ? 'selected' : ''}>${s.title}</option>`).join(''))}
      <div class="overlay open" onclick="closeEditor()">
        <div class="sheet" onclick="event.stopPropagation()">
          <div class="sheet-header">

// ═══════════════════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════════════════
function flipCard() {
  isFlipped = !isFlipped;
  render();
}

function prevCard() {
  if (deck.length === 0) return;
  cardIdx = (cardIdx - 1 + deck.length) % deck.length;
  isFlipped = false;
  render();
}

function skipCard() {
  if (deck.length === 0) return;
  cardIdx = (cardIdx + 1) % deck.length;
  isFlipped = false;
  render();
}

function shuffleDeck() {
  deck = shuffle([...deck]);
  cardIdx = 0;
  isFlipped = false;
  render();
}

function resetDeck() {
  if (!confirm('Fortschritt wirklich zurücksetzen? Alle Karten kommen erneut dran.')) return;
  initDeck();
  render();
}

function changeSet(idx) {
  currentSetIdx = parseInt(idx);
  initDeck();
  render();
}

function openEditor() {
  editorMode = 'sets';
  editorSetIdx = currentSetIdx;
  render();
}

function closeEditor() {
  editorMode = null;
  render();
}

function switchEditorSet(idx) {
  editorSetIdx = idx;
  editorMode = 'cards';
  render();
}

function startAddCard() {
  editorMode = 'addCard';
  render();
}

function startEditCard(i) {
  editCardIdx = i;
  editorMode = 'editCard';
  render();
}

function saveNewCard() {
  const q = document.getElementById('f-q').value.trim();
  const a = document.getElementById('f-a').value.trim();
  const section = document.getElementById('f-section').value.trim();
  const img = document.getElementById('f-img').value.trim();
  if (!q || !a) { alert('Frage und Antwort sind Pflichtfelder.'); return; }
  const card = { q, a };
  if (section) card.section = section;
  if (img) card.img = img;
  allSets[editorSetIdx].cards.push(card);
  persistUserSets();
  if (currentSetIdx === editorSetIdx) initDeck();
  editorMode = 'cards';
  render();
}

function saveEditCard() {
  const q = document.getElementById('f-q').value.trim();
  const a = document.getElementById('f-a').value.trim();
  const section = document.getElementById('f-section').value.trim();
  const img = document.getElementById('f-img').value.trim();
  if (!q || !a) { alert('Frage und Antwort sind Pflichtfelder.'); return; }
  const card = { q, a };
  if (section) card.section = section;
  if (img) card.img = img;
  allSets[editorSetIdx].cards[editCardIdx] = card;
  persistUserSets();
  if (currentSetIdx === editorSetIdx) initDeck();
  editorMode = 'cards';
  render();
}

function saveNewSet() {
  const name = document.getElementById('f-setname').value.trim();
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }
  const newSet = { id: 'user_' + Date.now(), title: name, cards: [] };
  allSets.push(newSet);
  persistUserSets();
  editorSetIdx = allSets.length - 1;
  editorMode = 'cards';
  render();
}

function deleteCard(i) {
  if (!confirm('Karte wirklich löschen?')) return;
  allSets[editorSetIdx].cards.splice(i, 1);
  persistUserSets();
  if (currentSetIdx === editorSetIdx) initDeck();
  render();
}

function deleteSet(i) {
  if (!isUserSet(i)) { alert('Vordefinierte Sets können nicht gelöscht werden.'); return; }
  if (!confirm(`Set \"${allSets[i].title}" wirklich löschen?`)) return;
  allSets.splice(i, 1);
  if (currentSetIdx >= allSets.length) currentSetIdx = 0;
  if (editorSetIdx >= allSets.length) editorSetIdx = 0;
  persistUserSets();
  initDeck();
  editorMode = 'sets';
  render();
}

function persistUserSets() {
  const userSets = allSets.slice(BUILT_IN_SETS.length);
  saveUserSets(userSets);
}

function escHtml(s = '') {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

// ═══════════════════════════════════════════════════════════════
initDeck();
render();
